<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Pattern Index Dashboard</title>
<style>
  :root {
    --bg: #0f1117;
    --card: #1a1d27;
    --border: #2a2d3a;
    --text: #e8eaf0;
    --sub: #8b8fa8;
    --equity: #22c55e;
    --gold: #f59e0b;
    --debt: #3b82f6;
    --danger: #ef4444;
    --warning: #f59e0b;
    --success: #22c55e;
    --accent: #6366f1;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    font-size: 14px;
    min-height: 100vh;
  }

  .topbar {
    background: var(--card);
    border-bottom: 1px solid var(--border);
    padding: 14px 16px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .topbar h1 { font-size: 16px; font-weight: 700; letter-spacing: 0.5px; }
  .topbar .index-label {
    font-size: 12px;
    color: var(--accent);
    font-weight: 600;
    background: rgba(99,102,241,0.15);
    padding: 3px 10px;
    border-radius: 20px;
  }
  .last-updated { font-size: 11px; color: var(--sub); }

  .signal-banner {
    margin: 14px 14px 0;
    padding: 14px 16px;
    border-radius: 12px;
    display: flex;
    align-items: center;
    gap: 12px;
    font-weight: 700;
    font-size: 15px;
    border: 1px solid;
  }
  .signal-banner.stay    { background: rgba(34,197,94,0.1);  border-color: rgba(34,197,94,0.3);  color: var(--success); }
  .signal-banner.move    { background: rgba(245,158,11,0.1); border-color: rgba(245,158,11,0.3); color: var(--warning); }
  .signal-banner.exit    { background: rgba(239,68,68,0.1);  border-color: rgba(239,68,68,0.3);  color: var(--danger); }
  .signal-banner .icon { font-size: 22px; }
  .signal-banner .sub { font-size: 11px; font-weight: 400; color: var(--sub); margin-top: 2px; }

  .cards {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    padding: 14px;
  }
  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 14px;
  }
  .card.wide { grid-column: span 2; }
  .card .label { font-size: 11px; color: var(--sub); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 6px; }
  .card .value { font-size: 20px; font-weight: 700; }
  .card .sub   { font-size: 11px; color: var(--sub); margin-top: 3px; }
  .card .value.equity { color: var(--equity); }
  .card .value.gold   { color: var(--gold); }
  .card .value.debt   { color: var(--debt); }
  .card .value.pos    { color: var(--success); }
  .card .value.neg    { color: var(--danger); }

  .triggers-row { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 8px; }
  .trigger-chip {
    font-size: 11px; padding: 3px 9px; border-radius: 20px; font-weight: 600;
    border: 1px solid;
  }
  .trigger-chip.active   { background: rgba(239,68,68,0.15); color: var(--danger);  border-color: rgba(239,68,68,0.3); }
  .trigger-chip.inactive { background: rgba(139,143,168,0.1); color: var(--sub);    border-color: var(--border); }

  .chart-wrap { padding: 0 14px 14px; }
  .chart-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 14px;
  }
  .chart-card .chart-title {
    font-size: 12px; color: var(--sub);
    text-transform: uppercase; letter-spacing: 0.5px;
    margin-bottom: 12px;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  svg.sparkline { width: 100%; height: 80px; overflow: visible; }

  .table-wrap { padding: 0 14px 80px; }
  .table-title {
    font-size: 12px; color: var(--sub);
    text-transform: uppercase; letter-spacing: 0.5px;
    margin-bottom: 10px;
    display: flex;
    justify-content: space-between;
  }
  .table-outer {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
  }
  .table-scroll { overflow-x: auto; }
  table { width: 100%; border-collapse: collapse; font-size: 12px; }
  thead th {
    background: rgba(99,102,241,0.08);
    color: var(--sub);
    font-weight: 600;
    text-transform: uppercase;
    font-size: 10px;
    letter-spacing: 0.5px;
    padding: 10px 10px;
    text-align: right;
    white-space: nowrap;
    border-bottom: 1px solid var(--border);
  }
  thead th:first-child { text-align: left; }
  tbody tr { border-bottom: 1px solid rgba(42,45,58,0.6); }
  tbody tr:last-child { border-bottom: none; }
  tbody tr:hover { background: rgba(255,255,255,0.02); }
  tbody td { padding: 9px 10px; text-align: right; white-space: nowrap; color: var(--text); }
  tbody td:first-child { text-align: left; }
  .asset-tag {
    display: inline-block;
    padding: 2px 8px;
    border-radius: 20px;
    font-size: 10px;
    font-weight: 700;
    text-transform: uppercase;
  }
  .asset-tag.equity { background: rgba(34,197,94,0.15);  color: var(--equity); }
  .asset-tag.gold   { background: rgba(245,158,11,0.15); color: var(--gold); }
  .asset-tag.debt   { background: rgba(59,130,246,0.15); color: var(--debt); }
  .asset-tag.cash   { background: rgba(139,143,168,0.15); color: var(--sub); }
  .pos { color: var(--success); }
  .neg { color: var(--danger); }

  .loading {
    display: flex;
    align-items: center;
    justify-content: center;
    height: 60vh;
    flex-direction: column;
    gap: 12px;
    color: var(--sub);
  }
  .spinner {
    width: 32px; height: 32px;
    border: 3px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .params-bar {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    background: var(--card);
    border-top: 1px solid var(--border);
    padding: 10px 14px;
    display: flex;
    gap: 12px;
    overflow-x: auto;
    font-size: 11px;
    color: var(--sub);
  }
  .params-bar span { white-space: nowrap; }
  .params-bar b { color: var(--text); }
</style>
</head>
<body>

<div id="root">
  <div class="loading">
    <div class="spinner"></div>
    <div>Loading dashboard…</div>
  </div>
</div>

<script>
const API = '/api/data';
let liveRows = [], lookbackData = [], params = {};

async function fetchAndRender() {
  try {
    const res = await fetch(API);
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const json = await res.json();

    // ── Parse history — handle both flat array and {live_rows, lookback_data} dict ──
    const hist = json.history;
    if (Array.isArray(hist)) {
      // Legacy flat format
      liveRows = hist;
      lookbackData = [];
    } else if (hist && typeof hist === 'object') {
      liveRows     = Array.isArray(hist.live_rows)     ? hist.live_rows     : [];
      lookbackData = Array.isArray(hist.lookback_data) ? hist.lookback_data : [];
    } else {
      liveRows = [];
      lookbackData = [];
    }

    params = json.params || {};
    render();
  } catch(e) {
    document.getElementById('root').innerHTML =
      `<div class="loading"><div>⚠️ Could not load data<br><span style="font-size:11px;margin-top:6px;display:block;color:var(--sub)">${e.message}</span></div></div>`;
  }
}

function render() {
  if (!liveRows.length) {
    document.getElementById('root').innerHTML =
      `<div class="loading"><div>No data yet — runs today at 11:30 PM IST</div></div>`;
    return;
  }

  const latest    = liveRows[liveRows.length - 1];
  const ma_lb     = params.ma_lookback || '–';
  const idx       = params.index_label || 'INDEX';
  const startCap  = params.initial_capital || 100000;

  // ── Signal banner class ──
  const sig = latest.signal || '';
  let bannerClass = 'stay', bannerIcon = '✅';
  if (sig.includes('EXIT') || sig.includes('→')) { bannerClass = 'exit'; bannerIcon = '🚨'; }
  if (sig.includes('recovery'))                  { bannerClass = 'move'; bannerIcon = '🔄'; }
  if (sig.includes('BOUGHT'))                    { bannerClass = 'move'; bannerIcon = '✅'; }
  if (sig.includes('SELLING'))                   { bannerClass = 'exit'; bannerIcon = '⏳'; }

  const assetClass = (latest.asset || '').toLowerCase();

  // ── P&L ──
  const pv      = latest.portfolio_value  ?? startCap;
  const bv      = latest.benchmark_value  ?? startCap;
  const pnl     = pv - bv;
  const pnlPct  = ((pv - startCap) / startCap * 100).toFixed(2);
  const bmPct   = ((bv - startCap) / startCap * 100).toFixed(2);

  // ── Trigger count (FIX: was undefined variable `tc`) ──
  const tc = latest.triggers ?? (
    (latest.t_pe_floor   ? 1 : 0) +
    (latest.t_pe_ceiling ? 1 : 0) +
    (latest.t_dd         ? 1 : 0) +
    (latest.t_ma         ? 1 : 0)
  );

  // ── Trigger chips — computed from data (individual flags may be absent) ──
  const pe_pct_val = latest.pe_pct ?? 0;
  const triggerFlags = [
    latest.t_pe_floor   != null ? latest.t_pe_floor   === true : pe_pct_val < (params.pe_floor   ?? 0.05) * 100,
    latest.t_pe_ceiling != null ? latest.t_pe_ceiling === true : pe_pct_val > (params.pe_ceiling ?? 0.80) * 100,
    latest.t_dd         != null ? latest.t_dd         === true : (latest.portfolio_dd ?? 0) < -(params.dd_threshold ?? 0.12) * 100,
    latest.t_ma         != null ? latest.t_ma         === true : (latest.price != null && latest.price_ma != null && latest.price < latest.price_ma),
  ];
  const triggerLabels = ['PE Below Floor', 'PE Above Ceiling', 'DD > Threshold', 'Price < MA'];
  const chips = triggerLabels.map((lbl, i) =>
    `<span class="trigger-chip ${triggerFlags[i] ? 'active' : 'inactive'}">${lbl}</span>`
  ).join('');

  // ── Settlement badge ──
  const settlementState = latest.settlement_state || 'NORMAL';
  const settlementBadge = settlementState !== 'NORMAL'
    ? ` · ⏳ ${settlementState.replace(/_/g, ' ')}` : '';

  const pendingInfo = latest.pending_target
    ? `<div class="sub" style="margin-top:4px;color:var(--warning)">Pending: buying ${latest.pending_target} on T+2</div>`
    : '';

  // ── Sparkline: use lookbackData for the price/PE history chart ──
  const sparkHTML = buildPortfolioSparkline(liveRows);
  const priceSparkHTML = buildPriceSparkline(lookbackData);

  // ── Table rows (live_rows, newest first) ──
  const rows = [...liveRows].reverse().map((r) => {
    const ac  = (r.asset||'').toLowerCase();
    const pdd = r.portfolio_dd ?? 0;
    const bdd = r.benchmark_dd ?? 0;
    const rpv = r.portfolio_value ?? 0;
    const rbv = r.benchmark_value ?? 0;
    const ss  = r.settlement_state && r.settlement_state !== 'NORMAL'
      ? ` <span style="font-size:9px;color:var(--warning)">⏳</span>` : '';
    return `
    <tr>
      <td>${r.date}${ss}</td>
      <td>${r.pe ?? '–'}</td>
      <td>${r.pe_pct != null ? r.pe_pct+'%' : '–'}</td>
      <td>₹${(r.price||0).toLocaleString('en-IN')}</td>
      <td>${r.price_ma ?? '–'}</td>
      <td>₹${r.gold_nav ?? '–'}</td>
      <td>${r.gold_ma ?? '–'}</td>
      <td><span class="asset-tag ${ac}">${r.asset||'–'}</span></td>
      <td class="${bdd<0?'neg':'pos'}">${bdd>=0?'+':''}${bdd}%</td>
      <td class="${pdd<0?'neg':'pos'}">${pdd>=0?'+':''}${pdd}%</td>
      <td>₹${rpv.toLocaleString('en-IN',{minimumFractionDigits:0,maximumFractionDigits:0})}</td>
      <td>₹${rbv.toLocaleString('en-IN',{minimumFractionDigits:0,maximumFractionDigits:0})}</td>
    </tr>`;
  }).join('');

  document.getElementById('root').innerHTML = `
  <div class="topbar">
    <div>
      <h1>Pattern Index</h1>
      <div class="last-updated">Updated ${latest.date}</div>
    </div>
    <span class="index-label">${idx}</span>
  </div>

  <div class="signal-banner ${bannerClass}">
    <span class="icon">${bannerIcon}</span>
    <div>
      <div>${sig}</div>
      <div class="sub">${tc}/4 triggers fired today${settlementBadge}</div>
      ${pendingInfo}
    </div>
  </div>

  <div class="cards">
    <div class="card">
      <div class="label">Holding</div>
      <div class="value ${assetClass}">${latest.asset||'–'}</div>
      <div class="sub">Current position</div>
    </div>
    <div class="card">
      <div class="label">PE Ratio</div>
      <div class="value">${latest.pe||'–'}</div>
      <div class="sub">${latest.pe_pct != null ? latest.pe_pct+'th %ile ('+params.pe_lookback+'d)' : '–'}</div>
    </div>
    <div class="card">
      <div class="label">Portfolio Value</div>
      <div class="value ${pnlPct>=0?'pos':'neg'}">₹${pv.toLocaleString('en-IN',{maximumFractionDigits:0})}</div>
      <div class="sub ${pnlPct>=0?'pos':'neg'}">${pnlPct>=0?'+':''}${pnlPct}% since start</div>
    </div>
    <div class="card">
      <div class="label">vs Benchmark</div>
      <div class="value ${pnl>=0?'pos':'neg'}">${pnl>=0?'+':''} ₹${Math.abs(pnl).toLocaleString('en-IN',{maximumFractionDigits:0})}</div>
      <div class="sub">Benchmark ${bmPct>=0?'+':''}${bmPct}%</div>
    </div>
    <div class="card wide">
      <div class="label">Active Triggers</div>
      <div class="triggers-row">${chips}</div>
    </div>
    <div class="card">
      <div class="label">Index Price</div>
      <div class="value">₹${(latest.price||0).toLocaleString('en-IN')}</div>
      <div class="sub">MA${ma_lb}: ${latest.price_ma ?? '–'}</div>
    </div>
    <div class="card">
      <div class="label">Gold NAV</div>
      <div class="value gold">₹${latest.gold_nav||'–'}</div>
      <div class="sub">MA${params.gold_ma_lookback||50}: ${latest.gold_ma ?? '–'}</div>
    </div>
  </div>

  <!-- Portfolio P&L chart (live_rows) -->
  <div class="chart-wrap">
    <div class="chart-card">
      <div class="chart-title">
        <span>Portfolio vs Benchmark</span>
        <span>${liveRows.length} day${liveRows.length===1?'':'s'} tracked</span>
      </div>
      ${sparkHTML}
    </div>
  </div>

  <!-- Index price history chart (lookback_data) -->
  ${lookbackData.length > 1 ? `
  <div class="chart-wrap">
    <div class="chart-card">
      <div class="chart-title">
        <span>${idx} Price History</span>
        <span>${lookbackData.length} days of data</span>
      </div>
      ${priceSparkHTML}
    </div>
  </div>` : ''}

  <!-- Live history table -->
  <div class="table-wrap">
    <div class="table-title">
      <span>Live History</span>
      <span>${liveRows.length} row${liveRows.length===1?'':'s'}</span>
    </div>
    <div class="table-outer">
      <div class="table-scroll">
        <table>
          <thead>
            <tr>
              <th>Date</th><th>PE</th><th>PE %ile</th>
              <th>Price</th><th>MA${ma_lb}</th>
              <th>Gold NAV</th><th>Gold MA</th>
              <th>Asset</th>
              <th>Bench DD</th><th>Port DD</th>
              <th>Portfolio ₹</th><th>Benchmark ₹</th>
            </tr>
          </thead>
          <tbody>${rows}</tbody>
        </table>
      </div>
    </div>
  </div>

  <div class="params-bar">
    <span>PE LB: <b>${params.pe_lookback||'–'}d</b></span>
    <span>Floor: <b>${params.pe_floor != null ? (params.pe_floor*100).toFixed(0)+'%' : '–'}</b></span>
    <span>Ceiling: <b>${params.pe_ceiling != null ? (params.pe_ceiling*100).toFixed(0)+'%' : '–'}</b></span>
    <span>DD: <b>${params.dd_threshold != null ? (params.dd_threshold*100).toFixed(0)+'%' : '–'}</b></span>
    <span>MA: <b>${params.ma_lookback||'–'}d</b></span>
    <span>Gold MA: <b>${params.gold_ma_lookback||50}d</b></span>
  </div>
  `;
}

// ── Portfolio sparkline (live_rows) ─────────────────────────────
function buildPortfolioSparkline(data) {
  if (data.length < 2) return '<p style="color:var(--sub);font-size:12px;padding:8px 0">Tracking starts today — chart will build over time ✅</p>';

  const pvs = data.map(r => r.portfolio_value ?? 0);
  const bvs = data.map(r => r.benchmark_value ?? 0);
  const all = [...pvs, ...bvs];
  const minV = Math.min(...all), maxV = Math.max(...all);
  const range = maxV - minV || 1;
  const W = 1000, H = 80, pad = 4;

  const toX = i => pad + (i / (data.length - 1)) * (W - pad*2);
  const toY = v => H - pad - ((v - minV) / range) * (H - pad*2);

  const pathPV = pvs.map((v,i) => `${i===0?'M':'L'}${toX(i)},${toY(v)}`).join(' ');
  const pathBV = bvs.map((v,i) => `${i===0?'M':'L'}${toX(i)},${toY(v)}`).join(' ');

  const bands = data.map((r,i) => {
    if (i === data.length - 1) return '';
    const x1 = toX(i), x2 = toX(i+1);
    const color = r.asset === 'EQUITY' ? '34,197,94' :
                  r.asset === 'GOLD'   ? '245,158,11' :
                  r.asset === 'CASH'   ? '139,143,168' : '59,130,246';
    return `<rect x="${x1}" y="${pad}" width="${x2-x1}" height="${H-pad*2}" fill="rgba(${color},0.06)"/>`;
  }).join('');

  return `
  <svg class="sparkline" viewBox="0 0 ${W} ${H}" preserveAspectRatio="none">
    ${bands}
    <path d="${pathBV}" fill="none" stroke="rgba(139,143,168,0.5)" stroke-width="1.5"/>
    <path d="${pathPV}" fill="none" stroke="#6366f1" stroke-width="2.5"/>
    <circle cx="${toX(data.length-1)}" cy="${toY(pvs[pvs.length-1])}" r="4" fill="#6366f1"/>
  </svg>
  <div style="display:flex;gap:16px;margin-top:8px;font-size:11px;color:var(--sub)">
    <span><svg width="12" height="2" viewBox="0 0 12 2" style="vertical-align:middle"><line x1="0" y1="1" x2="12" y2="1" stroke="#6366f1" stroke-width="2.5"/></svg> Portfolio</span>
    <span><svg width="12" height="2" viewBox="0 0 12 2" style="vertical-align:middle"><line x1="0" y1="1" x2="12" y2="1" stroke="rgba(139,143,168,0.5)" stroke-width="1.5"/></svg> Benchmark</span>
    <span style="color:rgba(34,197,94,0.7)">■ Equity</span>
    <span style="color:rgba(245,158,11,0.7)">■ Gold</span>
    <span style="color:rgba(59,130,246,0.7)">■ Debt</span>
    <span style="color:rgba(139,143,168,0.7)">■ Cash</span>
  </div>`;
}

// ── Index price sparkline (lookback_data) ────────────────────────
function buildPriceSparkline(data) {
  if (data.length < 2) return '';
  const prices = data.map(r => r.price ?? 0);
  const mas    = data.map(r => r.price_ma);
  const minV = Math.min(...prices), maxV = Math.max(...prices);
  const range = maxV - minV || 1;
  const W = 1000, H = 80, pad = 4;

  const toX = i => pad + (i / (data.length - 1)) * (W - pad*2);
  const toY = v => H - pad - ((v - minV) / range) * (H - pad*2);

  const pathPrice = prices.map((v,i) => `${i===0?'M':'L'}${toX(i)},${toY(v)}`).join(' ');

  // MA line — only where available
  let pathMA = '';
  let maStarted = false;
  for (let i = 0; i < mas.length; i++) {
    if (mas[i] == null) continue;
    pathMA += `${!maStarted ? 'M' : 'L'}${toX(i)},${toY(mas[i])} `;
    maStarted = true;
  }

  return `
  <svg class="sparkline" viewBox="0 0 ${W} ${H}" preserveAspectRatio="none">
    <path d="${pathPrice}" fill="none" stroke="rgba(99,102,241,0.7)" stroke-width="1.5"/>
    ${pathMA ? `<path d="${pathMA}" fill="none" stroke="rgba(245,158,11,0.6)" stroke-width="1.5" stroke-dasharray="4,3"/>` : ''}
    <circle cx="${toX(data.length-1)}" cy="${toY(prices[prices.length-1])}" r="4" fill="#6366f1"/>
  </svg>
  <div style="display:flex;gap:16px;margin-top:8px;font-size:11px;color:var(--sub)">
    <span><svg width="12" height="2" viewBox="0 0 12 2" style="vertical-align:middle"><line x1="0" y1="1" x2="12" y2="1" stroke="rgba(99,102,241,0.7)" stroke-width="1.5"/></svg> Index Price</span>
    ${pathMA ? `<span><svg width="12" height="2" viewBox="0 0 12 2" style="vertical-align:middle"><line x1="0" y1="1" x2="12" y2="1" stroke="rgba(245,158,11,0.6)" stroke-width="1.5" stroke-dasharray="4,3"/></svg> MA${params.ma_lookback||'–'}</span>` : ''}
  </div>`;
}

fetchAndRender();
setInterval(fetchAndRender, 5 * 60 * 1000);
</script>
</body>
</html>
